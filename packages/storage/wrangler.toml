name = "cloudpress-storage"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 라우트/커스텀 도메인은 wrangler.toml이 아니라 Cloudflare 대시보드
# (Workers & Pages → cloudpress-storage → Settings → Domains & Routes)에서 직접 설정.
# 필요한 라우트: storage.cloud-press.co.kr/* → Custom Domain

[[kv_namespaces]]
binding = "CHUNKS"
id = "e43b498e58dc423094d46cebbb1c1f01"

[[kv_namespaces]]
binding = "CREDENTIALS"
id = "4c5483498989466993a9d75ecaabbdd9"

[[d1_databases]]
binding = "META_DB"
database_name = "cloudpress-storage-meta"
database_id = "7f962d8c-7a3c-49de-ae2c-974cf63eec74"

[[durable_objects.bindings]]
name = "WP_DB"
class_name = "WordPressDbDO"

[[durable_objects.bindings]]
name = "LOAD_BALANCER"
class_name = "LoadBalancerDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WordPressDbDO", "LoadBalancerDO"]

[vars]
STORAGE_BASE_URL = "https://storage.cloud-press.co.kr"
TEMPLATE_API_KEY = "REPLACE_WITH_SECRET"  # wrangler secret put TEMPLATE_API_KEY
SMALL_OBJECT_THRESHOLD = "65536"

# wrangler secret put INTERNAL_SHARED_SECRET --name cloudpress-storage
# packages/api 의 동일 이름 시크릿과 반드시 같은 값이어야 함 (/internal/* 보호용)
