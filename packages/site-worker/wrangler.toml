name = "cloudpress-site-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 모든 사이트를 이 Worker 하나가 서빙한다 (사이트 생성 시 재배포/재라우트 불필요).
# Host 헤더에서 siteId를 파싱해 PhpRuntimeDO(idFromName)로 사이트별 격리.
# 최초 1회만 아래를 준비해두면 이후 사이트가 몇 개든 자동으로 서빙된다:
#   1) DNS: *.cloud-press.co.kr → 프록시됨(오렌지 클라우드) A/CNAME 레코드
#   2) 아래 [[routes]] 로 와일드카드 라우트 등록 (배포 시 자동 적용)
[[routes]]
pattern = "*.cloud-press.co.kr/*"
zone_name = "cloud-press.co.kr"

[[services]]
binding = "STORAGE_WORKER"
service = "cloudpress-storage"

[[durable_objects.bindings]]
name = "PHP_RUNTIME"
class_name = "PhpRuntimeDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PhpRuntimeDO"]

[vars]
STORAGE_BASE_URL = "https://storage.cloud-press.co.kr"
ROOT_ZONE        = "cloud-press.co.kr"

# wrangler secret put INTERNAL_SHARED_SECRET --name cloudpress-site-worker
# packages/storage, packages/api 와 동일한 값이어야 함
