<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 정보 — CloudPress Bridge</title>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="db-layout">
  <aside class="db-sidebar">
    <div class="db-sidebar-logo"><span>Cloud</span>Press</div>
    <nav class="db-nav">
      <div class="db-nav-section">메인</div>
      <a class="db-nav-link" href="/dashboard/index.html"><span class="icon">⊞</span> 호스팅</a>
      <a class="db-nav-link" href="/dashboard/domains.html"><span class="icon">🌐</span> 도메인</a>
      <div class="db-nav-section">계정</div>
      <a class="db-nav-link" href="/dashboard/billing.html"><span class="icon">💳</span> 청구</a>
      <a class="db-nav-link" href="/dashboard/my-information.html"><span class="icon">👤</span> 내 정보</a>
    </nav>
    <div style="padding:var(--sp-6);border-top:1px solid var(--border)">
      <button class="btn btn-ghost btn-sm w-full" onclick="signOut()">로그아웃</button>
    </div>
  </aside>

  <main class="db-main">
    <div class="db-topbar"><div class="db-topbar-title">내 정보</div></div>
    <div class="db-content" style="max-width:560px">

      <div class="card" style="margin-bottom:var(--sp-6)">
        <div class="fw-600" style="margin-bottom:var(--sp-6)">계정 정보</div>
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input class="form-input" id="user-email" type="email" disabled style="opacity:.6">
        </div>
        <div class="form-group">
          <label class="form-label">이름</label>
          <input class="form-input" id="user-name" type="text" placeholder="이름">
        </div>
        <button class="btn btn-primary" onclick="saveProfile()">저장</button>
      </div>

      <div class="card">
        <div class="fw-600" style="margin-bottom:var(--sp-2)">로그아웃</div>
        <div class="text-sm text-muted" style="margin-bottom:var(--sp-4)">모든 디바이스에서 세션이 종료됩니다.</div>
        <button class="btn btn-danger btn-sm" onclick="signOut()">로그아웃</button>
      </div>

    </div>
  </main>
</div>
<script src="/js/common.js"></script>
<script>
async function init() {
  const user = await requireAuth();
  if (!user) return;
  document.getElementById('user-email').value = user.email || '';
}

function saveProfile() {
  toast('저장되었습니다.');
}

init();
</script>
</body>
</html>
